<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:if condition="{record.tx_container_package_be_color}">
    <style>
        [data-tx-container-parent="{record.uid}"] {
            background-color: {record.tx_container_package_be_color} !important;
        }
    </style>
</f:if>

<f:if condition="{record.tx_container_grid}">
    <f:then><f:format.raw>{record.tx_container_grid}</f:format.raw></f:then>
    <f:else><f:format.raw>{tx_container_grid}</f:format.raw></f:else>
</f:if>

</html>
